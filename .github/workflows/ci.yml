name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  native-package:
    name: Native Debian package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev

      - name: Build native Debian package
        run: |
          make clean
          make package-deb

      - name: Upload native Debian package
        uses: actions/upload-artifact@v4
        with:
          name: runpod-shim-native-deb
          path: build/*.deb

  compatible-package:
    name: Ubuntu 20.04 compatible package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build compatible Debian package
        run: make package-deb-compatible

      - name: Upload compatible Debian package
        uses: actions/upload-artifact@v4
        with:
          name: runpod-shim-compatible-deb
          path: build/*.deb
